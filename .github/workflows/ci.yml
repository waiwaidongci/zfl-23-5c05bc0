name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: 使用 Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: 安装依赖
        run: npm install

      - name: 运行测试
        run: npm test

  health-check:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: 使用 Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: 安装依赖
        run: npm install

      - name: 启动服务（测试环境）
        run: |
          DB_FILE=shadow-puppet.ci.json UPLOADS_DIR=ci-uploads PORT=3023 node server.js &
          echo $! > server.pid
          sleep 2

      - name: 健康检查
        run: npm run healthcheck

      - name: 停止服务
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

      - name: 清理测试文件
        if: always()
        run: |
          rm -f data/shadow-puppet.ci.json
          rm -rf ci-uploads
